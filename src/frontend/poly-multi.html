<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly Multi Sports</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.PolySportsAppConfig = {
            title: 'Poly Multi Sports',
            fileApiBaseUrl: 'http://localhost:4030',
        };

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fira Sans', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        background: '#0C0C0C',
                        foreground: '#E8E8E2',
                        primary: '#228B22',
                        secondary: '#4CAF50',
                        accent: '#FFB300',
                        muted: '#161616',
                        border: '#2A2A2A',
                        borderHover: 'rgba(255, 255, 255, 0.12)',
                        surface: '#111111',
                        'surface-hover': '#1C1C1C',
                        card: '#111111',
                        leaf: '#4CAF50',
                        bark: '#8B4513',
                        sky: '#87CEEB',
                    },
                    borderRadius: {
                        'organic': '16px',
                        'organic-lg': '24px',
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./preview/poly-terminal.css">
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./preview/runtime.js"></script>
    <script type="text/babel" src="./preview/icons.jsx"></script>
    <script type="text/babel" src="./preview/notifications.jsx"></script>
    <script type="text/babel" src="./preview/sse.js"></script>
    <script type="text/babel" src="./preview/sports-card.jsx"></script>
    <script type="text/babel" src="./preview/poly-multi.jsx"></script>
    <script type="text/babel" src="./preview/app.jsx"></script>
</body>

</html>
